name: cute_live
description: "App for GF LIVE"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.0
  flutter_bloc: ^9.1.1
  go_router: ^16.2.1
  get_it: ^8.2.0
  flutter_lints: ^5.0.0
  equatable: ^2.0.5
  flutter_secure_storage: ^9.2.4
  smooth_page_indicator: ^1.2.1
  flutter_spinkit: ^5.2.1
  pin_code_fields: ^8.0.1
  google_fonts: ^6.3.0
  flutter_launcher_icons: ^0.14.4
  zego_uikit_prebuilt_live_audio_room: ^3.16.6
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  google_sign_in: ^7.2.0
  flutter_svga: ^0.0.6
  cloud_firestore: ^6.0.2
  zego_uikit: ^2.28.28
  permission_handler: ^12.0.1
  rxdart: ^0.28.0
  intl: ^0.20.2
  cloud_functions: ^6.0.4
  firebase_storage: ^13.0.4
  image_picker: ^1.2.1
  country_picker: ^2.0.27
  share_plus: ^12.0.1
  app_links: ^6.4.1
  firebase_database: ^12.1.0
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  record: ^6.1.2
  file_picker: ^10.3.3
  url_launcher: ^6.3.2
  video_player: ^2.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/emojis/
    - assets/greedy/
    - assets/spinner/
    - assets/animations/
    - assets/svga/
    - assets/banner/


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/gf_live.png"