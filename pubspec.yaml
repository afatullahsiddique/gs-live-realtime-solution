name: cute_live
description: "App for Cute Live"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.0
  flutter_bloc: ^9.1.1
  go_router: ^16.2.1
  get_it: ^8.2.0
  flutter_lints: ^5.0.0
  equatable: ^2.0.5
  flutter_secure_storage: ^9.2.4
  smooth_page_indicator: ^1.2.1
  flutter_spinkit: ^5.2.1
  pin_code_fields: ^8.0.1
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
